when:
  - event: [push, pull_request]

steps:
  # ── CI: type-check (all branches, push + PR) ──

  - name: type-check
    image: node:22-slim
    commands:
      - npm install
      - npm run type-check

  # ── Deploy: CF Worker (push to main only) ──

  - name: deploy
    image: node:22-slim
    when:
      - event: push
        branch: main
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: cloudflare_account_id
      MCP_KEYS_KV_ID:
        from_secret: mcp_keys_kv_id
      D1_DATABASE_ID:
        from_secret: portal_d1_database_id
      WORKER_ROUTE_PATTERN:
        from_secret: portal_worker_route_pattern
      WORKER_ROUTE_ZONE:
        from_secret: portal_worker_route_zone
    commands:
      - npm install
      - cd frontend && npm install && npm run build && cd ..
      - |
        node -e "
        const fs = require('fs');
        const config = {
          '\$schema': 'node_modules/wrangler/config-schema.json',
          name: 'cassandra-portal',
          main: 'src/index.ts',
          compatibility_date: '2025-03-10',
          compatibility_flags: ['nodejs_compat'],
          assets: {
            directory: './frontend/dist',
            binding: 'ASSETS',
            not_found_handling: 'single-page-application',
            run_worker_first: ['/api/*']
          },
          kv_namespaces: [
            { binding: 'MCP_KEYS', id: process.env.MCP_KEYS_KV_ID }
          ],
          d1_databases: [
            { binding: 'PORTAL_DB', database_name: 'cassandra-portal', database_id: process.env.D1_DATABASE_ID }
          ],
          services: [
            { binding: 'AUTH_SERVICE', service: 'cassandra-auth' }
          ],
          routes: [
            { pattern: process.env.WORKER_ROUTE_PATTERN, zone_name: process.env.WORKER_ROUTE_ZONE }
          ],
          observability: { enabled: true }
        };
        fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
        "
      - npx wrangler d1 execute cassandra-portal --remote --file=src/migrations/001_initial.sql
      - npx wrangler d1 execute cassandra-portal --remote --file=src/migrations/002_runner_config.sql
      - npx wrangler d1 execute cassandra-portal --remote --file=src/migrations/003_vault_mcp_servers.sql
      - npx wrangler deploy
