name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run type-check

      - name: Build frontend
        run: cd frontend && npm install && npm run build

      - name: Template wrangler.jsonc
        run: |
          node -e "
          const fs = require('fs');
          const config = {
            '\$schema': 'node_modules/wrangler/config-schema.json',
            name: 'cassandra-portal',
            main: 'src/index.ts',
            compatibility_date: '2025-03-10',
            compatibility_flags: ['nodejs_compat'],
            assets: {
              directory: './frontend/dist',
              binding: 'ASSETS',
              run_worker_first: ['/api/*']
            },
            kv_namespaces: [
              { binding: 'MCP_KEYS', id: process.env.MCP_KEYS_KV_ID }
            ],
            d1_databases: [
              { binding: 'PORTAL_DB', database_name: 'cassandra-portal', database_id: process.env.D1_DATABASE_ID }
            ],
            routes: [
              { pattern: process.env.WORKER_ROUTE_PATTERN, zone_name: process.env.WORKER_ROUTE_ZONE }
            ],
            observability: { enabled: true }
          };
          fs.writeFileSync('wrangler.jsonc', JSON.stringify(config, null, 2));
          "
        env:
          MCP_KEYS_KV_ID: ${{ secrets.MCP_KEYS_KV_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          WORKER_ROUTE_PATTERN: ${{ secrets.WORKER_ROUTE_PATTERN }}
          WORKER_ROUTE_ZONE: ${{ secrets.WORKER_ROUTE_ZONE }}

      - name: Run D1 migrations
        run: |
          # Use --command instead of --file to avoid the /import API which needs extra permissions
          SQL=$(cat src/migrations/001_initial.sql)
          npx wrangler d1 execute cassandra-portal --remote --command="$SQL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
